{% extends 'layouts/base.html' %}

{% block content %}
<div class="max-w-md mx-auto mt-20 bg-gray-800 p-8 rounded-xl border border-gray-700 shadow-2xl">
    <div class="text-center mb-8">
        <h2 class="text-3xl font-black text-white">Create Account</h2>
        <p class="text-gray-400 mt-2">Join PortfolioIQ to start tracking your risk.</p>
    </div>

    <form method="POST" action="{% url 'register_view' %}" class="space-y-6">
        {% csrf_token %}
        
        {% for field in form %}
            <div>
                <label class="block text-sm font-bold text-gray-400 mb-2">{{ field.label }}</label>
                {{ field }}
                {% if field.errors %}
                    <p class="text-red-400 text-sm mt-1">{{ field.errors.0 }}</p>
                {% endif %}
            </div>
        {% endfor %}

        <button type="submit" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 rounded-lg transition-all shadow-lg">
            Sign Up
        </button>
    </form>
    
    <p class="text-center text-gray-400 mt-6 text-sm">
        Already have an account? <a href="{% url 'login_view' %}" class="text-blue-400 hover:text-blue-300 font-bold">Log in</a>
    </p>
</div>

<script>
    document.addEventListener("DOMContentLoaded", function() {
        const inputs = document.querySelectorAll('input');
        inputs.forEach(input => {
            input.classList.add('w-full', 'bg-gray-900', 'border', 'border-gray-600', 'rounded-lg', 'px-4', 'py-3', 'text-white', 'focus:ring-2', 'focus:ring-blue-500', 'outline-none');
        });
    });
</script>
{% endblock %}
