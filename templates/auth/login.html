{% extends 'layouts/base.html' %}

{% block content %}
<div class="max-w-md mx-auto mt-20 bg-gray-800 p-8 rounded-xl border border-gray-700 shadow-2xl">
    <div class="text-center mb-8">
        <h2 class="text-3xl font-black text-white">Welcome Back</h2>
        <p class="text-gray-400 mt-2">Log in to view your AI risk dashboard.</p>
    </div>

    <form method="POST" action="{% url 'login_view' %}" class="space-y-6">
        {% csrf_token %}
        
        {% if form.errors %}
        <div class="bg-red-500/20 border border-red-500 text-red-400 p-3 rounded-lg text-sm text-center">
            Invalid email or password.
        </div>
        {% endif %}

        <div>
            <label class="block text-sm font-bold text-gray-400 mb-2">Email</label>
            <input type="text" name="username" required class="w-full bg-gray-900 border border-gray-600 rounded-lg px-4 py-3 text-white focus:ring-2 focus:ring-blue-500 outline-none">
        </div>

        <div>
            <label class="block text-sm font-bold text-gray-400 mb-2">Password</label>
            <input type="password" name="password" required class="w-full bg-gray-900 border border-gray-600 rounded-lg px-4 py-3 text-white focus:ring-2 focus:ring-blue-500 outline-none">
        </div>

        <button type="submit" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 rounded-lg transition-all shadow-lg">
            Log In
        </button>
    </form>
    
    <p class="text-center text-gray-400 mt-6 text-sm">
        Don't have an account? <a href="{% url 'register_view' %}" class="text-blue-400 hover:text-blue-300 font-bold">Sign up</a>
    </p>
</div>
{% endblock %}
